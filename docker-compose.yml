services:
  miniplan:
    container_name: miniplan
    build: .
    ports:
      - "8000:8000"
    # MINIPLAN_SECRET_KEY wird bei Bedarf hier gesetzt, um den beim ersten Start
    # automatisch generierten und in /data/secret_key abgelegten Schlüssel zu überschreiben.
    # Reverse-Proxy-Betrieb (MINIPLAN_COOKIE_SECURE, UVICORN_FORWARDED_ALLOW_IPS): siehe README.md
    volumes:
      - miniplan-data:/data
    restart: unless-stopped

volumes:
  miniplan-data:
